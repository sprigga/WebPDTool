# version: '3.8'

services:
  # ✅ Added: Redis service for real-time log streaming (optional)
  redis:
    image: redis:7-alpine
    container_name: webpdtool-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    networks:
      - webpdtool-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: webpdtool-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webpdtool}
      MYSQL_USER: ${MYSQL_USER:-pdtool}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pdtool123}
      TZ: Asia/Taipei
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql:ro
      - ./database/seed_instruments.sql:/docker-entrypoint-initdb.d/03-seed_instruments.sql:ro
    networks:
      - webpdtool-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webpdtool-backend
    restart: unless-stopped
    environment:
      # Database configuration
      # 注意: 這些環境變數會覆蓋 volume mount 帶進來的 .env 檔案中的 host.docker.internal 設定
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-pdtool}
      DB_PASSWORD: ${MYSQL_PASSWORD:-pdtool123}
      DB_NAME: ${MYSQL_DATABASE:-webpdtool}
      # Alembic migration 使用此變數（alembic/env.py 優先讀取 DATABASE_URL）
      # 避免 alembic 從 .env 讀到 host.docker.internal:33306
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-pdtool}:${MYSQL_PASSWORD:-pdtool123}@db:3306/${MYSQL_DATABASE:-webpdtool}

      # Application configuration
      APP_NAME: WebPDTool
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-false}

      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      # ACCESS_TOKEN_EXPIRE_MINUTES: 30  # 原本設定: 30 分鐘
      ACCESS_TOKEN_EXPIRE_MINUTES: 480  # 修改為: 8 小時 (480 分鐘)

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:9080,http://localhost}

      # ✅ Added: Redis configuration for logging
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_LOG_TTL: ${REDIS_LOG_TTL:-3600}

      # Timezone
      TZ: Asia/Taipei

      # ✅ Added: Alembic migration automation
      # Set to "true" to skip automatic migrations on container start
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      # Maximum time to wait for database connection (default: 10 seconds)
      # 說明: depends_on: service_healthy 已確保 db 健康後才啟動 backend
      # 因此 entrypoint 的等待通常 < 3 秒，10 秒已足夠作為備用保護
      MIGRATION_TIMEOUT: ${MIGRATION_TIMEOUT:-10}
      # Additional arguments to pass to alembic (e.g., "--sql")
      ALEMBIC_ARGS: ${ALEMBIC_ARGS:-}
    ports:
      - "${BACKEND_PORT:-9100}:9100"
    volumes:
      - ./backend:/app
      # 移除 PDTool4 目錄掛載 - PDTool4 不應放置在容器內
      # - ./PDTool4:/app/PDTool4:ro
      # Uncomment for development hot-reload
      # - ./backend/app:/app/app
      # 遮蓋 .env 檔案，避免 volume mount 將本機 .env (host.docker.internal:33306) 帶入容器
      # 容器內應使用 docker-compose environment 區塊中的環境變數
      - /dev/null:/app/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webpdtool-network
    depends_on:
      db:
        condition: service_healthy
      # ✅ Redis is optional - backend can work without it
      redis:
        condition: service_healthy
    healthcheck:
      # 原本: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9100/health')"]
      # 修正: requests 模組未安裝，改用 Python 標準庫 urllib
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webpdtool-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9080}:80"
    networks:
      - webpdtool-network
    depends_on:
      - backend
    healthcheck:
      # 原本: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      # 修正: wget 預設使用 IPv6 localhost (::1)，但 nginx 只監聽 IPv4
      # 解決方案: 使用 curl 或指定 IPv4 位址
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  webpdtool-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:  # ✅ Added: Redis data volume
    driver: local
